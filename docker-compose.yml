version: '3.8'

services:
  tictactoeweb:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped
    container_name: tictactoeweb-app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/game/state"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
